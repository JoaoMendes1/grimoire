<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer"> <title>Grimoire</title>
</head>
<body>
    <div id="tela-login">
        <h2>Digite o PIN do Grimoire</h2>
        <input type="password" id="campo-pin" placeholder="Senha">
        <button onclick="tentarAcesso()">Entrar</button>
        <p id="aviso" style="color: red;"></p>
    </div>

    <div id="tela-app" style="display:none;">
        <h2>Meu Grimoire</h2>
        
        <div>
            <input type="text" id="novo-termo" placeholder="Palavra em inglês...">
            <button onclick="salvarPalavra()">Adicionar</button>
        </div>

        <ul id="lista-palavras"></ul>
    </div>

   <script>
        const headersApp = { 'Content-Type': 'application/json' };

        function tentarAcesso() {
            const pin = document.getElementById('campo-pin').value;
            headersApp['X-App-PIN'] = pin;

            fetch('/api/words', { method: 'GET', headers: headersApp })
            .then(res => {
                if (res.status === 401) {
                    document.getElementById('aviso').innerText = "PIN Incorreto!";
                } else {
                    document.getElementById('tela-login').style.display = 'none';
                    document.getElementById('tela-app').style.display = 'block';
                    carregarLista();
                }
            });
        }

        async function salvarPalavra() {
            const termo = document.getElementById('novo-termo').value;
            if (!termo) return;

            const resTrad = await fetch('/api/translate', { method: 'POST', headers: headersApp, body: JSON.stringify({ term: termo }) });
            const dadosTrad = await resTrad.json();
            
            const resAud = await fetch('/api/audio', { method: 'POST', headers: headersApp, body: JSON.stringify({ term: termo }) });
            const dadosAud = await resAud.json();

            const traducaoCorreta = dadosTrad.translatedText || dadosTrad.translation || dadosTrad.Translation || "Erro";
            const audioCorreto = dadosAud.audioUrl || dadosAud.AudioURL || "";

            await fetch('/api/words', {
                method: 'POST',
                headers: headersApp,
                body: JSON.stringify({ term: termo, translation: traducaoCorreta, audioUrl: audioCorreto })
            });

            document.getElementById('novo-termo').value = '';
            carregarLista();
        }

        function carregarLista() {
            fetch('/api/words', { method: 'GET', headers: headersApp })
            .then(res => res.json())
            .then(dados => {
                const lista = document.getElementById('lista-palavras');
                lista.innerHTML = ''; // Limpa a lista antes de desenhar
                
                dados.forEach(palavra => {
                    const termoCorreto = palavra.term || palavra.Term || "";
                    const traducaoCorreta = palavra.translation || palavra.Translation || "";
                    const audioCorreto = palavra.audioUrl || palavra.AudioURL || "";
                    
                    // Cria a linha da lista
                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${termoCorreto}</strong> - ${traducaoCorreta} `;
                    
                    // Cria o botão de forma segura, sem quebrar o link
                    const btn = document.createElement('button');
                    btn.textContent = 'Ouvir';
                    btn.onclick = function() {
                        if (audioCorreto && audioCorreto.startsWith("http")) {
                            new Audio(audioCorreto).play().catch(() => alert("Áudio bloqueado pelo navegador."));
                        } else {
                            alert("Áudio inválido para esta palavra.");
                        }
                    };
                    
                    li.appendChild(btn);
                    lista.appendChild(li);
                });
            });
        }
    </script>
</body>
</html>
